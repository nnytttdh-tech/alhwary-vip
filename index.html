<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALHWARY VIP SYSTEM</title>
    <style>
        :root { --fire: #ff0000; --gold: #ffcc00; --dark: #080808; }
        body { margin: 0; background: var(--dark); font-family: 'Courier New', monospace; color: #fff; text-align: center; }
        .wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .panel { border: 2px solid var(--fire); background: #000; padding: 25px; width: 100%; max-width: 360px; border-radius: 12px; box-shadow: 0 0 20px var(--fire); }
        .id-box { border: 2px dashed var(--gold); padding: 15px; margin: 20px 0; background: rgba(255, 204, 0, 0.05); }
        .id-num { font-size: 26px; color: var(--gold); font-weight: bold; letter-spacing: 2px; }
        .action-btn { display: block; width: 100%; padding: 14px; margin-top: 10px; background: transparent; border: 1px solid var(--fire); color: #fff; font-weight: bold; cursor: pointer; text-decoration: none; }
        .code-list { display: none; margin-top: 20px; text-align: left; background: #111; padding: 10px; border: 1px solid var(--gold); }
        .code-item { border-bottom: 1px solid #333; padding: 10px 0; color: var(--gold); }
    </style>
</head>
<body onload="checkAccess()">

<div class="wrapper">
    <div id="login-screen" class="panel">
        <h2 style="color:var(--fire)">ALHWARY VIP 🦅</h2>
        <p id="status-msg">جارٍ التحقق من صلاحية الجهاز...</p>
        
        <div class="id-box">
            <div style="font-size: 10px; color: var(--gold)">YOUR DEVICE ID</div>
            <div class="id-num" id="myID">....</div>
        </div>

        <button class="action-btn" onclick="copyID()">نسخ الـ ID</button>
        <a href="https://wa.me/201556853817" class="action-btn" style="border-color:#fff">تفعيل الـ VIP</a>
    </div>

    <div id="vip-screen" class="panel" style="display:none">
        <h2 style="color:var(--gold)">WELCOME VIP 🦅</h2>
        <div id="codes-container"></div>
        <button class="action-btn" onclick="location.reload()">تحديث الأكواد</button>
    </div>
</div>

<script>
    const GITHUB_URL = "https://raw.githubusercontent.com/nnytttdh-tech/alhwary-vip/main/codes.json";

    function getID() {
        if(!localStorage.getItem('alhwary_id')) {
            const hex = '0123456789ABCDEF';
            let id = '';
            for(let i=0; i<8; i++) id += hex[Math.floor(Math.random()*16)];
            localStorage.setItem('alhwary_id', id);
        }
        return localStorage.getItem('alhwary_id');
    }

    async function checkAccess() {
        const id = getID();
        document.getElementById('myID').innerText = id;
        
        try {
            const response = await fetch(GITHUB_URL + "?v=" + Date.now());
            const data = await response.json();
            
            // التحقق إذا كان الـ ID موجود في قائمة التفعيل
            if (data.active_users && data.active_users[id]) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('vip-screen').style.display = 'block';
                displayCodes(data.net_codes);
            } else {
                document.getElementById('status-msg').innerText = "الجهاز غير مفعل. انسخ الـ ID وأرسله للمدير.";
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "خطأ في الاتصال بالسيرفر.";
        }
    }

    function displayCodes(codes) {
        const container = document.getElementById('codes-container');
        if (codes.length === 0) {
            container.innerHTML = "<p>لا توجد أكواد متاحة حالياً.</p>";
            return;
        }
        let html = "";
        codes.forEach(c => {
            // فك التشفير وعرض الكود
            html += `<div class="code-item">
                        <b>الكود:</b> ${atob(c.code)} <br>
                        <b>الوحدات:</b> ${c.units}
                     </div>`;
        });
        container.innerHTML = html;
    }

    function copyID() {
        navigator.clipboard.writeText(getID());
        alert("تم نسخ ID الهواري: " + getID());
    }
</script>
</body>
</html>
