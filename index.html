<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALHWARY VIP SYSTEM</title>
    <style>
        :root { 
            --fire-red: #ff0f0f; 
            --gold: #ffb400;     
            --bg: #030303;      
        }

        body { 
            margin: 0; 
            background: var(--bg); 
            font-family: 'Courier New', monospace; 
            color: #ccc; 
            overflow: hidden; 
        }
        
        #particles-js { position: fixed; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; }

        .wrapper { 
            position: relative; 
            z-index: 2; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            padding: 20px; 
        }
        
        .panel { 
            border: 2px solid var(--fire-red); 
            background: rgba(10, 0, 0, 0.95); 
            padding: 30px; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-shadow: 0 0 25px rgba(255, 15, 15, 0.4); 
            border-radius: 8px;
        }

        .title { 
            font-size: 26px; 
            letter-spacing: 2px; 
            font-weight: bold; 
            margin-bottom: 5px; 
            color: var(--fire-red); 
            text-shadow: 0 0 10px var(--fire-red);
        }

        .sub-title {
            color: var(--gold);
            font-size: 18px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .id-container { 
            border: 2px dashed var(--gold); 
            padding: 20px; 
            margin: 20px 0;
            background: rgba(255, 180, 0, 0.05); 
        }

        .id-value { 
            font-size: 32px; 
            letter-spacing: 5px; 
            font-weight: bold; 
            color: var(--gold); 
        }

        .btn {
            display: block; width: 100%; padding: 15px; margin-top: 12px;
            background: transparent; border: 1px solid var(--fire-red);
            color: #fff; text-decoration: none; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: var(--fire-red); color: #000; }
        
        .version { font-size: 10px; margin-top: 30px; opacity: 0.3; }
    </style>
</head>
<body onload="initAlhwary()">

<div id="particles-js"></div>

<div class="wrapper">
    <div class="panel">
        <div class="title">ALHWARY VIP</div>
        <div class="sub-title">🦅</div>
        
        <p style="font-size: 14px;">تم استخراج معرف الجهاز تلقائياً</p>

        <div class="id-container">
            <div style="font-size: 11px; margin-bottom: 10px;">YOUR DEVICE ID:</div>
            <div class="id-value" id="myID">....</div>
        </div>

        <button class="btn" onclick="copyID()">نسخ المعرف (ID)</button>
        <a href="https://wa.me/201556853817" class="btn">تفعيل العضوية VIP</a>

        <div class="version">ALHWARY SECURITY SYSTEM v6.0</div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
<script>
    // الدالة التي تعمل فور الدخول للموقع
    function initAlhwary() {
        if(!localStorage.getItem('hw_id')) {
            const chars = '0123456789ABCDEF';
            let newId = '';
            for(let i=0; i<8; i++) newId += chars[Math.floor(Math.random()*16)];
            localStorage.setItem('hw_id', newId);
        }
        document.getElementById('myID').innerText = localStorage.getItem('hw_id');
    }

    function copyID() {
        const id = document.getElementById('myID').innerText;
        navigator.clipboard.writeText(id);
        alert("تم نسخ ID الهواري: " + id);
    }

    particlesJS("particles-js", {
        "particles": {
            "number": { "value": 60 },
            "color": { "value": "#ff0f0f" },
            "move": { "enable": true, "speed": 3, "direction": "top" }
        }
    });
</script>
</body>
</html>
