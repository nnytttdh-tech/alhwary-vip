<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALHWARY VIP</title>
    <style>
        :root { 
            --fire: #ff0000; 
            --gold: #ffcc00;     
            --dark: #080808;      
        }

        body { 
            margin: 0; background: var(--dark); 
            font-family: 'Courier New', monospace; 
            color: #fff; display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden;
        }
        
        /* تأثير الجزيئات في الخلفية */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; opacity: 0.5; }

        .container { 
            position: relative; z-index: 2; width: 90%; max-width: 360px;
            border: 2px solid var(--fire); background: rgba(0, 0, 0, 0.9);
            padding: 25px; text-align: center; border-radius: 12px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        .header { font-size: 28px; font-weight: bold; color: var(--fire); letter-spacing: 2px; margin-bottom: 5px; text-shadow: 0 0 10px var(--fire); }
        .eagle { font-size: 24px; margin-bottom: 15px; }
        .info-text { font-size: 13px; color: #bbb; margin-bottom: 20px; }

        /* صندوق الـ ID المطور */
        .id-box { 
            border: 2px dashed var(--gold); padding: 15px; margin-bottom: 25px;
            background: rgba(255, 204, 0, 0.05); border-radius: 8px;
        }
        .id-label { font-size: 10px; color: var(--gold); letter-spacing: 1px; margin-bottom: 8px; }
        .id-num { font-size: 26px; font-weight: bold; color: var(--gold); letter-spacing: 3px; }

        /* الأزرار الاحترافية */
        .action-btn {
            display: block; width: 100%; padding: 14px; margin-bottom: 12px;
            background: transparent; border: 1px solid var(--fire);
            color: #fff; font-size: 15px; font-weight: bold; text-decoration: none;
            border-radius: 5px; transition: 0.3s; cursor: pointer;
            box-sizing: border-box;
        }
        .action-btn:hover { background: var(--fire); color: #000; box-shadow: 0 0 15px var(--fire); }
        .btn-wa { border-color: #fff; color: #fff; }

        .footer { font-size: 9px; color: #444; margin-top: 20px; letter-spacing: 1px; }
    </style>
</head>
<body onload="startSystem()">

<canvas id="bg-canvas"></canvas>

<div class="container">
    <div class="header">ALHWARY VIP</div>
    <div class="eagle">🦅</div>
    
    <div class="info-text">تم استخراج معرف الجهاز تلقائياً</div>

    <div class="id-box">
        <div class="id-label">: YOUR DEVICE ID</div>
        <div class="id-num" id="displayID">LOADING...</div>
    </div>

    <button class="action-btn" onclick="copyMyID()">نسخ المعرف (ID)</button>
    <a href="https://wa.me/201556853817" class="action-btn btn-wa">تفعيل العضوية VIP</a>

    <div class="footer">ALHWARY SECURITY SYSTEM v7.0.0</div>
</div>

<script>
    function startSystem() {
        // توليد ID لو مش موجود
        if(!localStorage.getItem('alhwary_id')) {
            const hex = '0123456789ABCDEF';
            let id = '';
            for(let i=0; i<8; i++) id += hex[Math.floor(Math.random()*16)];
            localStorage.setItem('alhwary_id', id);
        }
        document.getElementById('displayID').innerText = localStorage.getItem('alhwary_id');
        initParticles();
    }

    function copyMyID() {
        const idText = document.getElementById('displayID').innerText;
        navigator.clipboard.writeText(idText);
        alert("🦅 تم نسخ معرف الهواري: " + idText);
    }

    // تأثير خلفية خفيف ومنظم
    function initParticles() {
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let p = [];
        for(let i=0; i<50; i++) p.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2+1, s:Math.random()*1+0.5});
        function draw() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#ff0000";
            p.forEach(i => {
                ctx.beginPath(); ctx.arc(i.x, i.y, i.r, 0, Math.PI*2); ctx.fill();
                i.y -= i.s; if(i.y < 0) i.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        draw();
    }
</script>
</body>
</html>
