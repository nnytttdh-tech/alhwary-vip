<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALHWARY VIP TERMINAL</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body, html { margin: 0; padding: 0; background: var(--bg); font-family: monospace; overflow: hidden; color: var(--neon); text-align: center; }
        #matrix { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.3; }
        .container { position: relative; z-index: 2; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .terminal { background: rgba(0,0,0,0.95); border: 1px solid var(--neon); padding: 25px; width: 85%; max-width: 450px; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .status-header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .code-box { border: 1px dashed var(--neon); margin: 10px 0; padding: 15px; font-size: 20px; background: rgba(0,255,65,0.05); }
        
        /* الزرار الجديد المطلب */
        .admin-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            text-decoration: none;
            font-family: monospace;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 65, 0.2);
        }
        .admin-btn:hover {
            background: var(--neon);
            color: var(--bg);
            box-shadow: 0 0 25px var(--neon);
        }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 10px; margin-top: 25px; opacity: 0.6; }
    </style>
</head>
<body oncontextmenu="return false;">
<canvas id="matrix"></canvas>
<div class="container">
    <div class="terminal">
        <div class="status-header">
            <div style="font-size: 20px; letter-spacing: 2px;">ALHWARY VIP v5.0</div>
            <div id="sysMsg" style="margin-top:5px;">> INITIALIZING...</div>
        </div>

        <div id="contentArea">
            </div>

        <div class="stats">
            <div>PING: <span id="ping">0</span>ms</div>
            <div>STATUS: <span id="lockState">LOCKED</span></div>
        </div>
    </div>
</div>

<script>
    // --- تأثير الماتريكس ---
    const canvas = document.getElementById('matrix');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/14)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0,0,0,0.05)"; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = "#00ff41"; ctx.font = "14px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("01"[Math.floor(Math.random()*2)], i*14, y*14);
            if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 35);

    // --- الربط بالبيانات ---
    const DATA_URL = "https://raw.githubusercontent.com/nnytttdh-tech/ALHWARY-VIP-/main/codes.json";

    async function updateSystem() {
        const start = performance.now();
        try {
            const res = await fetch(DATA_URL + "?v=" + Date.now());
            const data = await res.json();
            
            document.getElementById('ping').innerText = Math.floor(performance.now() - start);
            document.getElementById('lockState').innerText = data.site_status.toUpperCase();

            if(data.site_status === "open") {
                document.getElementById('sysMsg').innerHTML = "> <span style='color:white'>ACCESS GRANTED</span>";
                let h = "";
                data.net_codes.forEach(c => {
                    h += `<div class="code-box">${atob(c.code)}<br><small style="font-size:10px">${c.units} Units</small></div>`;
                });
                document.getElementById('contentArea').innerHTML = h || "No codes found";
            } else {
                document.getElementById('sysMsg').innerHTML = "> <span style='color:#ff3e3e'>SYSTEM RESTRICTED</span>";
                // الزرار الجديد مربوط برقمك المكتوب
                document.getElementById('contentArea').innerHTML = `
                    <div style="margin: 20px 0; font-size: 14px; line-height: 1.6;">
                        عذراً، اشتراكك غير مفعل حالياً<br>
                        يرجى مراجعة الإدارة لتفعيل الـ ID
                    </div>
                    <a href="https://wa.me/201556853817" class="admin-btn">تفعيل الـ ID عن طريق المدير</a>
                `;
            }
        } catch(e) { 
            document.getElementById('sysMsg').innerText = "> CONNECTION ERROR"; 
        }
    }

    setInterval(updateSystem, 5000);
    updateSystem();
</script>
</body>
</html>
